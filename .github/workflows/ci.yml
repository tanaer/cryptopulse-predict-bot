name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: cryptopulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:root@localhost:5432/cryptopulse
      BOT_API_TOKEN: testtoken
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm -w packages/db run prisma:generate
      - run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma
      - run: npm run typecheck
      - run: npm -w apps/admin run lint
      - run: npm test
      - run: npx playwright install --with-deps chromium
        working-directory: apps/admin
      - run: npm run test:e2e -- --project=chromium
        working-directory: apps/admin

